<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExifClean | Professional Metadata Purge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.4/piexif.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root { --primary: #2563eb; --slate: #0f172a; --green: #10b981; --red: #ef4444; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8fafc; margin: 0; color: var(--slate); }
        
        /* Security Trust Bar */
        .trust-bar { background: #0f172a; color: #38bdf8; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 11px; position: sticky; top: 0; z-index: 1000; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #eab308; box-shadow: 0 0 8px #eab308; } 
        .offline { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .lang-select { padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; cursor: pointer; background: white; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .hero { text-align: center; margin-bottom: 30px; }
        .slogan { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }

        #drop-area { border: 2px dashed #cbd5e1; border-radius: 20px; padding: 60px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #drop-area:hover { border-color: var(--primary); background: #f0f7ff; transform: translateY(-2px); }

        /* Audit Cards */
        .audit-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .data-box { background: #f8fafc; padding: 15px; border-radius: 12px; font-family: 'Menlo', monospace; font-size: 12px; border: 1px solid #edf2f7; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
        
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 15px; transition: 0.2s; text-decoration: none; text-align: center; box-sizing: border-box; }
        .btn-scrub { background: var(--slate); color: white; }
        .btn-down { background: var(--green); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

<div class="trust-bar">
    <div><span class="dot online" id="status-dot"></span> <span id="status-text">NETWORK SECURED</span></div>
    <div>ZERO-DATA POLICY: 100% ON-DEVICE PROCESSING</div>
</div>

<div class="nav">
    <div style="font-weight: 900; color: var(--primary); font-size: 22px; letter-spacing: -0.5px;">🛡️ ExifClean</div>
    <select class="lang-select" id="lang-picker" onchange="changeLanguage()">
        <option value="en">🇺🇸 English</option>
        <option value="hi">🇮🇳 Hinglish</option>
        <option value="mr">🇮🇳 Marathi</option>
        <option value="es">🇪🇸 Spanish</option>
    </select>
</div>

<div class="container">
    <div class="hero">
        <div class="slogan" id="txt-slogan">Capture the moment, keep the privacy.</div>
        <h1 id="txt-title" style="margin: 0; font-size: 36px; letter-spacing: -1px;">ExifClean Pro</h1>
        <p id="txt-subtitle" style="color: #64748b; margin-top: 10px;">The genuine way to audit and wipe hidden tracking tokens from your photos.</p>
    </div>

    <div id="drop-area">
        <div style="font-size: 45px; margin-bottom: 15px;">📤</div>
        <strong id="txt-drop" style="font-size: 18px;">Drop Image or Click to Audit</strong>
        <p style="color: #94a3b8; font-size: 12px; margin-top: 8px;">Supports Multiple JPEGs. Session history is saved locally below.</p>
        <input type="file" id="fileInput" accept="image/jpeg" multiple style="display:none">
    </div>

    <div id="stack"></div>
</div>

<script>
    const translations = {
        en: { slogan: "Capture the moment, keep the privacy.", title: "ExifClean Pro", subtitle: "The genuine way to audit and wipe hidden tracking tokens.", drop: "Drop Image or Click to Audit", scrub: "Wipe All Metadata", download: "Download Cleaned Photo", risk: "VULNERABILITIES DETECTED", safe: "SECURED", netOn: "NETWORK SECURED", netOff: "MAXIMUM SECURITY: OFFLINE" },
        hi: { slogan: "Moment कैप्चर करें, प्राइवेसी बचाएं।", title: "ExifClean Pro", subtitle: "छिपे हुए डेटा को ऑडिट और डिलीट करने का जेन्युइन तरीका।", drop: "फोटो यहाँ डालें", scrub: "सारा डेटा साफ़ करें", download: "साफ़ फोटो डाउनलोड करें", risk: "डाटा मिला (Unsafe)", safe: "सुरक्षित", netOn: "नेटवर्क सुरक्षित", netOff: "फुल प्राइवेसी: ऑफलाइन मोड" },
        mr: { slogan: "क्षण टिपून घ्या, प्रायव्हसी जपा.", title: "ExifClean Pro", subtitle: "तुमच्या फोटोंमधील लपलेला डेटा काढून टाकण्याचा सोपा मार्ग.", drop: "ऑडिटसाठी फोटो निवडा", scrub: "डेटा पुसून टाका", download: "स्वच्छ फोटो डाउनलोड करा", risk: "धोका आढळला", safe: "सुरक्षित", netOn: "नेटवर्क सुरक्षित", netOff: "ऑफलाईन मोड: फुल प्रायव्हसी" },
        es: { slogan: "Captura el momento, mantén la privacidad.", title: "ExifClean Pro", subtitle: "La forma genuina de auditar y borrar rastreadores ocultos.", drop: "Suelte imagen para auditar", scrub: "Limpiar Todo", download: "Descargar Foto Limpia", risk: "RIESGOS DETECTADOS", safe: "ASEGURADO", netOn: "RED ASEGURADA", netOff: "MÁXIMA SEGURIDAD: OFFLINE" }
    };

    function updateNet() {
        const lang = document.getElementById('lang-picker').value;
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        if (navigator.onLine) {
            dot.className = "dot online";
            txt.innerText = translations[lang].netOn;
        } else {
            dot.className = "dot offline";
            txt.innerText = translations[lang].netOff;
        }
    }
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);
    updateNet();

    function changeLanguage() {
        const lang = document.getElementById('lang-picker').value;
        const t = translations[lang];
        document.getElementById('txt-slogan').innerText = t.slogan;
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('txt-subtitle').innerText = t.subtitle;
        document.getElementById('txt-drop').innerText = t.drop;
        updateNet();
    }

    const fileInput = document.getElementById('fileInput');
    const stack = document.getElementById('stack');

    document.getElementById('drop-area').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (ev) => {
                EXIF.getData(file, function() {
                    createCard(file.name, EXIF.getAllTags(this), ev.target.result);
                });
            };
        });
    };

    function createCard(name, tags, raw) {
        const lang = document.getElementById('lang-picker').value;
        const id = 'c' + Math.random().toString(36).substr(2, 5);
        const card = document.createElement('div');
        card.className = 'audit-card';
        card.id = id;

        const keys = [
            { k: 'Make', l: 'Brand' },
            { k: 'Model', l: 'Device' },
            { k: 'DateTimeOriginal', l: 'Time' },
            { k: 'GPSLatitude', l: 'GPS' }
        ];

        let beforeHtml = "";
        let afterHtml = "";

        keys.forEach(item => {
            let val = tags[item.k] || "Not Found";
            if(item.k === 'GPSLatitude' && tags.GPSLatitude) val = "DETECTED";
            const color = tags[item.k] ? 'var(--red)' : '#94a3b8';
            beforeHtml += `<div class="row"><span>${item.l}</span><b style="color:${color}">${val}</b></div>`;
            afterHtml += `<div class="row"><span>${item.l}</span><b class="st-${id}" style="color:#cbd5e1">WAITING</b></div>`;
        });

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f1f5f9; padding-bottom:12px; margin-bottom:15px;">
                <strong style="font-size:14px;">📄 ${name}</strong>
                <span id="badge-${id}" style="font-size:10px; font-weight:900; color:var(--red); text-transform:uppercase;">${translations[lang].risk}</span>
            </div>
            <div class="grid">
                <div class="data-box"><strong>DETECTION (ORIGINAL)</strong><div style="margin-top:10px;">${beforeHtml}</div></div>
                <div class="data-box"><strong>SCRUB STATUS</strong><div style="margin-top:10px;">${afterHtml}</div></div>
            </div>
            <button class="btn btn-scrub" id="btn-${id}" onclick="doScrub('${id}', '${raw.replace(/'/g, "\\'")}', '${name}')">${translations[lang].scrub}</button>
        `;
        stack.prepend(card);
    }

    function doScrub(id, raw, name) {
        const lang = document.getElementById('lang-picker').value;
        try {
            const clean = piexif.remove(raw);
            const card = document.getElementById(id);
            card.querySelectorAll('.st-' + id).forEach(el => {
                el.innerText = 'PURGED';
                el.style.color = 'var(--green)';
            });
            const badge = document.getElementById('badge-' + id);
            badge.innerText = translations[lang].safe;
            badge.style.color = 'var(--green)';

            const oldBtn = document.getElementById('btn-' + id);
            const newBtn = document.createElement('a');
            newBtn.className = "btn btn-down";
            newBtn.href = clean;
            newBtn.download = "clean_" + name;
            newBtn.innerText = translations[lang].download;
            oldBtn.replaceWith(newBtn);
        } catch (e) { alert("Error cleaning file."); }
    }
</script>
</body>
</html>
